<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="60%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="32" height="32" rx="8" fill="url(#shine)"/>

  <!-- Two arrows forming a cycle (convert icon) -->
  <!-- Top-right arrow: left to right -->
  <path d="M7 11 Q16 7 22 11" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" stroke-opacity="0.95" filter="url(#glow)"/>
  <polygon points="22,8 26,11 22,14" fill="white" fill-opacity="0.95"/>

  <!-- Bottom-left arrow: right to left -->
  <path d="M25 21 Q16 25 10 21" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" stroke-opacity="0.95" filter="url(#glow)"/>
  <polygon points="10,18 6,21 10,24" fill="white" fill-opacity="0.95"/>
</svg>
