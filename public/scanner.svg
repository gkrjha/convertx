<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect width="64" height="64" rx="16" fill="url(#shine)"/>

  <!-- Top arc: left → right -->
  <path d="M13 22 Q32 12 46 22" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" stroke-opacity="0.95" filter="url(#glow)"/>
  <!-- Arrowhead right -->
  <polygon points="46,15 54,22 46,29" fill="white" fill-opacity="0.95"/>

  <!-- Bottom arc: right → left -->
  <path d="M51 42 Q32 52 18 42" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none" stroke-opacity="0.95" filter="url(#glow)"/>
  <!-- Arrowhead left -->
  <polygon points="18,35 10,42 18,49" fill="white" fill-opacity="0.95"/>
</svg>
