<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo icon -->
  <rect x="80" y="80" width="72" height="72" rx="18" fill="url(#grad)" fill-opacity="0.9"/>
  <text x="116" y="128" font-size="36" text-anchor="middle" fill="white">⚡</text>

  <!-- Brand name -->
  <text x="172" y="132" font-family="system-ui, sans-serif" font-size="42" font-weight="800" fill="url(#grad)">ConvertX</text>

  <!-- Main headline -->
  <text x="80" y="260" font-family="system-ui, sans-serif" font-size="72" font-weight="900" fill="white">Free Online</text>
  <text x="80" y="350" font-family="system-ui, sans-serif" font-size="72" font-weight="900" fill="url(#grad)">File Converter</text>

  <!-- Subtext -->
  <text x="80" y="420" font-family="system-ui, sans-serif" font-size="28" fill="white" fill-opacity="0.5">70+ tools · No signup · No install · Runs in browser</text>

  <!-- Format pills -->
  <rect x="80" y="470" width="100" height="40" rx="20" fill="#6366f1" fill-opacity="0.2" stroke="#6366f1" stroke-opacity="0.5" stroke-width="1"/>
  <text x="130" y="496" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#818cf8" text-anchor="middle">PDF</text>

  <rect x="196" y="470" width="110" height="40" rx="20" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-opacity="0.4" stroke-width="1"/>
  <text x="251" y="496" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#f472b6" text-anchor="middle">Image</text>

  <rect x="322" y="470" width="110" height="40" rx="20" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.4" stroke-width="1"/>
  <text x="377" y="496" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#34d399" text-anchor="middle">Video</text>

  <rect x="448" y="470" width="110" height="40" rx="20" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1"/>
  <text x="503" y="496" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#fbbf24" text-anchor="middle">Audio</text>

  <rect x="574" y="470" width="110" height="40" rx="20" fill="#06b6d4" fill-opacity="0.15" stroke="#06b6d4" stroke-opacity="0.4" stroke-width="1"/>
  <text x="629" y="496" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#22d3ee" text-anchor="middle">Excel</text>

  <!-- Right side decoration -->
  <rect x="900" y="150" width="220" height="280" rx="20" fill="white" fill-opacity="0.03" stroke="white" stroke-opacity="0.08" stroke-width="1"/>
  <text x="1010" y="240" font-size="64" text-anchor="middle">📄</text>
  <text x="980" y="310" font-family="system-ui, sans-serif" font-size="24" fill="white" fill-opacity="0.4" text-anchor="middle">→</text>
  <text x="1010" y="380" font-size="64" text-anchor="middle">📊</text>

  <!-- URL -->
  <text x="80" y="580" font-family="system-ui, sans-serif" font-size="22" fill="white" fill-opacity="0.25">convertx.app</text>
</svg>
